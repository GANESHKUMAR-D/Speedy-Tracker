<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Speedy Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue1:#5bb8ff;--blue2:#2196f3;--blue3:#1565c0;
  --green:#43d98c;--yellow:#ffe44d;--orange:#ff8c42;--red:#ff4b6e;
  --sky:#e0f4ff;--sky2:#c8eaff;--white:#ffffff;
  --text:#1a3a5c;--textsub:#5b8ab0;
}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--sky);color:var(--text);}
body{min-height:100vh;background:linear-gradient(180deg,#ddf0ff 0%,#f0faff 40%,#ffffff 100%);display:flex;flex-direction:column;align-items:center;}

header{
  position:sticky;top:0;z-index:100;width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(14px);
  border-bottom:2px solid rgba(91,184,255,0.25);
}
.logo{display:flex;align-items:center;gap:8px;}
.logo-ball{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue1),var(--blue2));display:flex;align-items:center;justify-content:center;font-size:16px;animation:bounce 2.5s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
.logo-text{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue2);}
.logo-text span{color:var(--orange);}
.gps-chip{display:flex;align-items:center;gap:5px;background:var(--sky2);border:1.5px solid var(--blue1);border-radius:20px;padding:4px 10px;font-size:0.65rem;font-weight:800;color:var(--blue3);}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:all .4s;}
.dot.on{background:#43d98c;box-shadow:0 0 0 3px rgba(67,217,140,.25);animation:blink 2s infinite;}
.dot.err{background:var(--orange);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

main{width:100%;max-width:430px;display:flex;flex-direction:column;gap:14px;padding:16px 14px 24px;}

.speed-card{
  background:var(--white);border-radius:28px;padding:28px 20px 22px;
  border:2px solid rgba(91,184,255,0.25);
  box-shadow:0 8px 32px rgba(33,150,243,0.13);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  position:relative;overflow:hidden;
}
.speed-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--blue1),var(--blue2),var(--blue1));background-size:200%;animation:slide 3s linear infinite;}
@keyframes slide{0%{background-position:0%}100%{background-position:200%}}

#mood-emoji{font-size:2rem;animation:moodBounce 2s ease-in-out infinite;}
@keyframes moodBounce{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
#speed-num{font-family:'Fredoka One',cursive;font-size:6rem;line-height:1;color:var(--blue2);transition:color .3s;letter-spacing:-2px;}
#speed-num.warn{color:var(--orange);}
#speed-num.danger{color:var(--red);}
#unit-lbl{font-size:0.75rem;font-weight:800;letter-spacing:4px;color:var(--textsub);text-transform:uppercase;}

.unit-toggle{display:flex;gap:0;background:var(--sky2);border:2px solid var(--blue1);border-radius:50px;padding:4px;width:100%;}
.unit-toggle button{flex:1;font-family:'Nunito',sans-serif;font-size:0.75rem;font-weight:800;letter-spacing:2px;padding:10px;border:none;background:none;color:var(--textsub);border-radius:50px;cursor:pointer;transition:all .25s;text-transform:uppercase;}
.unit-toggle button.active{background:linear-gradient(135deg,var(--blue1),var(--blue2));color:white;box-shadow:0 4px 14px rgba(33,150,243,0.4);}

#start-btn{
  width:100%;padding:18px;
  font-family:'Fredoka One',cursive;font-size:1.1rem;letter-spacing:3px;text-transform:uppercase;
  border:none;border-radius:50px;cursor:pointer;
  background:linear-gradient(135deg,#42b4ff 0%,#1e88e5 50%,#1565c0 100%);
  color:white;
  box-shadow:0 8px 24px rgba(33,150,243,0.4),inset 0 1px 0 rgba(255,255,255,.3);
  transition:all .3s;position:relative;overflow:hidden;
}
#start-btn:hover{transform:translateY(-2px) scale(1.02);}
#start-btn:active{transform:scale(.97);}
#start-btn.stop{background:linear-gradient(135deg,#ff6b6b,#f44336,#c62828);box-shadow:0 8px 24px rgba(244,67,54,0.4);}

#reset-btn{
  background:var(--sky2);border:2px solid var(--blue1);color:var(--blue3);
  font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:800;letter-spacing:2px;
  padding:11px 28px;border-radius:50px;cursor:pointer;text-transform:uppercase;transition:all .25s;width:100%;
}
#reset-btn:hover{background:var(--blue1);color:white;}

#msg{font-size:0.75rem;font-weight:700;letter-spacing:1px;color:var(--textsub);text-align:center;min-height:1.2em;transition:all .3s;}
#msg.ok{color:#28a55e;}
#msg.error{color:var(--orange);}

.bar-card{background:white;border:2px solid rgba(91,184,255,0.2);border-radius:20px;padding:14px 16px;box-shadow:0 4px 16px rgba(33,150,243,0.1);}
.bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.bar-title{font-size:0.68rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--blue3);}
#bar-pct{font-size:0.82rem;font-weight:900;color:var(--blue2);}
.bar-track{height:12px;background:var(--sky2);border-radius:12px;overflow:hidden;border:1.5px solid rgba(91,184,255,0.2);}
#bar-fill{height:100%;width:0%;border-radius:12px;background:linear-gradient(90deg,#74cbff,#2196f3,#1565c0);transition:width .5s ease;box-shadow:0 0 12px rgba(33,150,243,0.4);}
.bar-labels{display:flex;justify-content:space-between;margin-top:5px;}
.bar-labels span{font-size:0.58rem;font-weight:700;color:var(--textsub);}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{
  background:white;border:2px solid rgba(91,184,255,0.18);border-radius:20px;padding:14px;
  box-shadow:0 4px 16px rgba(33,150,243,0.08);display:flex;flex-direction:column;gap:3px;position:relative;overflow:hidden;
}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 18px 18px;}
.stat-card.blue::after{background:linear-gradient(90deg,var(--blue1),var(--blue2));}
.stat-card.green::after{background:linear-gradient(90deg,#43d98c,#00bfa5);}
.stat-card.yellow::after{background:linear-gradient(90deg,var(--yellow),var(--orange));}
.stat-card.red::after{background:linear-gradient(90deg,var(--orange),var(--red));}
.sc-emoji{font-size:1.2rem;}
.sc-label{font-size:0.58rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--textsub);}
.sc-value{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--text);line-height:1;}
.sc-unit{font-size:0.58rem;font-weight:700;color:var(--textsub);}

footer{width:100%;text-align:center;padding:10px;font-size:0.6rem;font-weight:700;letter-spacing:1.5px;color:var(--textsub);background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);border-top:1.5px solid rgba(91,184,255,0.2);}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-ball">🚀</div>
    <div class="logo-text">Speedy<span>Speedo</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="gps-chip">📡 <span id="gps-acc">— m</span></div>
    <div class="dot" id="dot"></div>
  </div>
</header>

<main>

  <div class="speed-card">
    <div id="mood-emoji">😴</div>
    <div id="speed-num">0</div>
    <div id="unit-lbl">KM/H</div>
  </div>

  <div class="unit-toggle">
    <button id="btn-kmh" class="active" onclick="setUnit('kmh')">🇰🇲 KM/H</button>
    <button id="btn-mph" onclick="setUnit('mph')">🇺🇸 MPH</button>
  </div>

  <button id="start-btn" onclick="toggleTracking()">
    <span id="btn-icon">▶</span> <span id="btn-txt">Start Tracking</span>
  </button>
  <button id="reset-btn" onclick="resetAll()">↺ Reset Stats</button>
  <div id="msg">Tap Start &amp; allow location to begin! 🚀</div>

  <div class="bar-card">
    <div class="bar-top">
      <div class="bar-title">⚡ Speed Level</div>
      <div id="bar-pct">0%</div>
    </div>
    <div class="bar-track"><div id="bar-fill"></div></div>
    <div class="bar-labels">
      <span>🐢 0</span><span>30</span><span>60</span><span>90</span><span>120</span><span>🚀 150+</span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card blue">
      <div class="sc-emoji">🏆</div>
      <div class="sc-label">Max Speed</div>
      <div class="sc-value" id="st-max">0</div>
      <div class="sc-unit" id="st-max-u">km/h peak</div>
    </div>
    <div class="stat-card green">
      <div class="sc-emoji">📈</div>
      <div class="sc-label">Avg Speed</div>
      <div class="sc-value" id="st-avg">0</div>
      <div class="sc-unit">moving avg</div>
    </div>
    <div class="stat-card yellow">
      <div class="sc-emoji">🗺️</div>
      <div class="sc-label">Distance</div>
      <div class="sc-value" id="st-dist">0.00</div>
      <div class="sc-unit" id="st-dist-u">km</div>
    </div>
    <div class="stat-card red">
      <div class="sc-emoji">⏱️</div>
      <div class="sc-label">Time</div>
      <div class="sc-value" id="st-time">00:00</div>
      <div class="sc-unit">elapsed</div>
    </div>
  </div>

</main>

<footer>📍 NEEDS LOCATION PERMISSION · 🛡️ SAFE RIDING ONLY · 🔋 KEEP SCREEN ON</footer>

<script>
let unit='kmh',tracking=false,watchId=null;
let curSpd=0,maxSpd=0,samples=[];
let startTime=null,timerInt=null;
let dist=0,lastPos=null;

const moods=[[0,'😴'],[5,'🚶'],[20,'🚲'],[50,'🚗'],[90,'🚀'],[120,'⚡']];
function getMood(kmh){let e='😴';for(const[s,em]of moods)if(kmh>=s)e=em;return e;}

function setUnit(u){
  unit=u;
  document.getElementById('btn-kmh').classList.toggle('active',u==='kmh');
  document.getElementById('btn-mph').classList.toggle('active',u==='mph');
  document.getElementById('unit-lbl').textContent=u==='kmh'?'KM/H':'MPH';
  document.getElementById('st-dist-u').textContent=u==='kmh'?'km':'mi';
  document.getElementById('st-max-u').textContent=u==='kmh'?'km/h peak':'mph peak';
  render(curSpd);
}
const cv=kmh=>unit==='kmh'?kmh:kmh*0.621371;
const cvDist=km=>unit==='kmh'?km:km*0.621371;

function render(kmh){
  const d=Math.round(cv(kmh));
  const el=document.getElementById('speed-num');
  el.textContent=d;
  el.classList.remove('warn','danger');
  if(kmh>120)el.classList.add('danger');
  else if(kmh>80)el.classList.add('warn');
  document.getElementById('mood-emoji').textContent=getMood(kmh);
  const pct=Math.min((kmh/150)*100,100);
  document.getElementById('bar-fill').style.width=pct+'%';
  document.getElementById('bar-pct').textContent=Math.round(pct)+'%';
  document.getElementById('st-max').textContent=Math.round(cv(maxSpd));
  const avg=samples.length?samples.reduce((a,b)=>a+b,0)/samples.length:0;
  document.getElementById('st-avg').textContent=Math.round(cv(avg));
  document.getElementById('st-dist').textContent=cvDist(dist).toFixed(2);
}

function startTimer(){
  startTime=Date.now();
  timerInt=setInterval(()=>{
    const s=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('st-time').textContent=
      String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },1000);
}

function hav(a,b,c,d){
  const R=6371,r=Math.PI/180;
  const dlat=(c-a)*r,dlon=(d-b)*r;
  const x=Math.sin(dlat/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dlon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function onPos(pos){
  document.getElementById('dot').className='dot on';
  document.getElementById('gps-acc').textContent='±'+Math.round(pos.coords.accuracy)+'m';
  let kmh=0;
  if(pos.coords.speed!==null&&pos.coords.speed>=0)kmh=pos.coords.speed*3.6;
  curSpd=kmh;
  if(kmh>maxSpd)maxSpd=kmh;
  if(kmh>0){samples.push(kmh);if(samples.length>80)samples.shift();}
  if(lastPos){const d=hav(lastPos.coords.latitude,lastPos.coords.longitude,pos.coords.latitude,pos.coords.longitude);if(d<0.5)dist+=d;}
  lastPos=pos;
  render(kmh);
  setMsg('🟢 Live GPS tracking active!','ok');
}

function onErr(e){
  const msgs={1:'❌ Location denied! Allow GPS in settings.',2:'📡 No GPS signal. Go outdoors.',3:'⏱️ GPS timed out. Stop & retry.'};
  setMsg(msgs[e.code]||'⚠️ GPS error.','error');
  document.getElementById('dot').className='dot err';
}

function toggleTracking(){tracking?stop():start();}

function start(){
  if(!navigator.geolocation){setMsg('❌ Browser not supported.','error');return;}
  tracking=true;
  document.getElementById('btn-icon').textContent='■';
  document.getElementById('btn-txt').textContent='Stop Tracking';
  document.getElementById('start-btn').classList.add('stop');
  setMsg('📡 Searching for GPS signal…');
  startTimer();
  watchId=navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

function stop(){
  tracking=false;
  if(watchId!==null)navigator.geolocation.clearWatch(watchId);
  clearInterval(timerInt);curSpd=0;
  document.getElementById('btn-icon').textContent='▶';
  document.getElementById('btn-txt').textContent='Start Tracking';
  document.getElementById('start-btn').classList.remove('stop');
  document.getElementById('dot').className='dot';
  render(0);setMsg('⏹️ Tracking stopped');
}

function resetAll(){
  maxSpd=0;samples=[];dist=0;lastPos=null;
  document.getElementById('st-time').textContent='00:00';
  if(timerInt){clearInterval(timerInt);if(tracking)startTimer();}
  render(curSpd);
  setMsg('✅ Stats reset!','ok');
  setTimeout(()=>setMsg(tracking?'🟢 Live GPS tracking active!':'Tap Start & allow location to begin! 🚀',tracking?'ok':''),1800);
}

function setMsg(t,type=''){const el=document.getElementById('msg');el.textContent=t;el.className=type;}
(async()=>{if('wakeLock'in navigator)try{await navigator.wakeLock.request('screen');}catch(e){}})();
</script>
</body>
</html>
